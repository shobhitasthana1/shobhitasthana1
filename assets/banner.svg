<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="0">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="1280" height="320" fill="url(#grid)" opacity=".35"/>

  <!-- Glow -->
  <circle cx="980" cy="70" r="140" fill="#4338CA" opacity=".18" filter="url(#glow)"/>
  <circle cx="250" cy="250" r="110" fill="#6366F1" opacity=".10" filter="url(#glow)"/>

  <!-- Decorative Lines -->
  <line x1="70" y1="90" x2="200" y2="90" stroke="url(#accent)" stroke-width="3"/>
  <line x1="1080" y1="235" x2="1210" y2="235" stroke="url(#accent)" stroke-width="3"/>

  <!-- Main Name -->
  <text
    x="70"
    y="140"
    fill="#F8FAFC"
    font-size="52"
    font-weight="700"
    font-family="Segoe UI, Arial, sans-serif">
    Shobhit Asthana
  </text>

  <!-- Subtitle -->
  <text
    x="70"
    y="182"
    fill="#A5B4FC"
    font-size="20"
    font-family="Segoe UI, Arial, sans-serif">
    Full-Stack Engineer • Creative Frontend Developer
  </text>

  <!-- Small Description -->
  <text
    x="70"
    y="225"
    fill="#94A3B8"
    font-size="16"
    font-family="Segoe UI, Arial, sans-serif">
    Building scalable systems and immersive web experiences.
  </text>

  <!-- Code Box -->
  <rect
    x="930"
    y="85"
    width="250"
    height="150"
    rx="16"
    fill="#0F172A"
    stroke="#3730A3"
    stroke-width="2"/>

  <text
    x="960"
    y="130"
    fill="#6366F1"
    font-size="18"
    font-family="Consolas, monospace">
&lt;/&gt;
  </text>

  <text
    x="960"
    y="165"
    fill="#F8FAFC"
    font-size="16"
    font-family="Consolas, monospace">
const developer = {
  </text>

  <text
    x="980"
    y="190"
    fill="#94A3B8"
    font-size="15"
    font-family="Consolas, monospace">
passion: "Build"
  </text>

  <text
    x="980"
    y="215"
    fill="#94A3B8"
    font-size="15"
    font-family="Consolas, monospace">
focus: "Performance"
  </text>

  <text
    x="960"
    y="240"
    fill="#F8FAFC"
    font-size="16"
    font-family="Consolas, monospace">
}
  </text>

</svg>