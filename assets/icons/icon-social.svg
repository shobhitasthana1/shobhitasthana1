<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="16"
    fill="#0F172A"
    stroke="url(#gradient)"
    stroke-width="2"/>

  <!-- Center Node -->
  <circle
    cx="32"
    cy="32"
    r="4"
    fill="#F8FAFC"/>

  <!-- Outer Nodes -->
  <circle cx="18" cy="20" r="3" fill="#6366F1"/>
  <circle cx="46" cy="20" r="3" fill="#6366F1"/>
  <circle cx="18" cy="44" r="3" fill="#6366F1"/>
  <circle cx="46" cy="44" r="3" fill="#6366F1"/>

  <!-- Connections -->
  <line x1="21" y1="21" x2="29" y2="29"
        stroke="#F8FAFC"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="43" y1="21" x2="35" y2="29"
        stroke="#F8FAFC"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="21" y1="43" x2="29" y2="35"
        stroke="#F8FAFC"
        stroke-width="2"
        stroke-linecap="round"/>

  <line x1="43" y1="43" x2="35" y2="35"
        stroke="#F8FAFC"
        stroke-width="2"
        stroke-linecap="round"/>

</svg>