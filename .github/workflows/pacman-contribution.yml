name: Generate Pac-Man Contribution Graph

# WHY THESE TRIGGERS:
# - schedule: makes the animation "self-regenerate" daily even if you don't push code
#   that day, so it reflects yesterday's contributions automatically.
# - workflow_dispatch: lets you manually re-run from the Actions tab any time
#   (e.g. right after setup, to see the result immediately instead of waiting).
# - push on main: re-renders instantly whenever you edit README.md or this workflow,
#   so you get fast feedback while customizing colors/speed.
on:
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC — adjust to your timezone if you like
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write # required so the action can commit the generated SVG to the output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Generates two themed SVGs (light + dark) straight from your live
      # GitHub contribution graph via the GraphQL API — no manual data entry,
      # no stale snapshots. This step is what makes it self-updating.
      - name: Generate Pac-Man arcade SVGs (light + dark)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # You can render more than one arcade game from the same data.
          # 'pacman' is the primary hero animation for the README;
          # 'breakout' is generated as a bonus/alternate you can swap in later.
          games: "pacman,breakout"

      # Publishes the generated SVGs to a dedicated "output" branch.
      # We keep generated assets OUT of main so your source tree (README,
      # workflow, LICENSE, project folders) stays clean and diff-friendly —
      # only this bot commits to "output", you never touch it by hand.
      - name: Publish generated SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}